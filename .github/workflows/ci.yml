name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Deterministic core suite: mock provider, embedded PostgreSQL, no API
      # keys, no live sites (crawl tests use the bundled local fixture server).
      AI_PROVIDER: mock
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5498/omniresearch
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (pinned pnpm from package.json)
        run: corepack enable

      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (embedded PostgreSQL boots automatically; migrations applied in test bootstrap)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify Crawlee pin (official repo clone + fixture crawl)
        run: pnpm setup:crawlee && pnpm verify:crawlee
